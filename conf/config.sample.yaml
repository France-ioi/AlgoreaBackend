server:
  port: 8080
  rootPath: "/" # the path at which the router is mounted
  compress: false # whether compression is enabled by default
  # domainOverride: dev.algorea.org # use this domain name for cookies and per-domain configuration choosing
  propagation_endpoint: "" # Endpoint to schedule the propagation asynchronously. If empty, propagation is synchronous.
  disableResultsPropagation: false # Disable the propagation of results.
auth:
  loginModuleURL: "http://127.0.0.1:8000"
  clientID: "1"
  clientSecret: "tzxsLyFtJiGnmD6sjZMqSEidVpVsL3hEoSxIXCpI"
token:
  platformName: algrorea_backend
  publicKeyFile: public_key.pem # one of (publicKeyFile, publicKey) is required
  #publicKey: |
  #  -----BEGIN PUBLIC KEY-----
  #  MIIBIjAN...
  #  -----END PUBLIC KEY-----
  privateKeyFile: private_key.pem # one of (privateKeyFile, privateKey) is required
database:
  user: algorea
  passwd: a_db_password
  addr: localhost
  net: tcp
  #dbname: algorea_db
  allownativepasswords: true
logging:
  format: text # text, json, console (colorized multiline text, suitable for development)
  output: stdout # stdout, stderr, file
  level: debug # debug, info, warning, error, fatal, panic
  logSQLQueries: true
  logRawSQLQueries: false # log low-level db operations, including row fetching and statement preparation (only needed for debugging during development)
  analyzeSQLQueries: false # run EXPLAIN ANALYZE on all SQL queries (works only if logSQLQueries is true)
event:
  dispatcher: "" # "sqs" or empty for no-op (events are not dispatched)
  instance: "" # optional instance identifier (e.g., "prod", "staging")
  sqs:
    queueURL: "" # SQS queue URL (required if dispatcher is "sqs")
    region: "" # AWS region (e.g., "eu-west-1"). If empty, uses default from AWS config.
# CORS allow-list applied to every API response.
# - allowedOrigins: full origins (scheme + host + optional port). Supports the
#   wildcard "*" to allow any origin and per-host wildcards like
#   "https://*.example.com". Defaults to [] in every environment when unset.
#   IMPORTANT: the underlying go-chi/cors library treats an empty list as
#   "allow any origin". With the default allowCredentials=false the middleware
#   therefore still echoes every caller's Origin back (without
#   Access-Control-Allow-Credentials) -- any site can read non-credentialed
#   responses. To actually deny every cross-origin call, set
#   allowCredentials=true together with an explicit list of trusted origins;
#   the safety rule below then refuses to start when that list is missing or
#   contains "*", giving you a fail-closed credentialed configuration.
# - allowCredentials: whether to send "Access-Control-Allow-Credentials: true"
#   so cookies / Authorization headers are usable cross-origin. Defaults to
#   false.
# Safety rule (enforced at startup; the app refuses to boot otherwise):
#   When allowCredentials is true, allowedOrigins MUST be an explicit
#   non-empty list that does not contain the bare "*". Note that the
#   underlying go-chi/cors library treats an unset/empty list as "allow any
#   origin", so a "credentials-only" config like
#     cors: { allowCredentials: true }
#   would otherwise echo every caller's Origin back with
#   Access-Control-Allow-Credentials: true (the canonical CSRF-via-CORS
#   misconfiguration). Per-host wildcards like "https://*.example.com" are
#   still permitted with credentials.
# Migration note: previous releases hardcoded ["*"] + AllowCredentials:true,
#   and the first configurable version kept ["*"] as a dev/test fallback
#   when this key was unset. Both behaviours are gone -- the unset case now
#   resolves to [] + allowCredentials=false in every environment. If a local
#   dev frontend (or any browser-driven integration test) relied on
#   credentialed cross-origin requests, you must add an explicit cors block
#   here with the trusted origins and allowCredentials: true to restore that
#   behaviour.
#cors:
#  allowedOrigins:
#    # When allowCredentials is true (below), this list MUST be non-empty
#    # AND MUST NOT contain the bare "*". Per-host wildcards like
#    # "https://*.example.com" remain allowed alongside credentials.
#    - https://www.france-ioi.org
#    - https://algorea.org
#    # - "*" # the bare "*" is rejected at startup when allowCredentials is true
#  allowCredentials: true
domains:
  -
    domains: [default] # of a list of domains
    allUsersGroup: 3
    nonTempUsersGroup: 4
    tempUsersGroup: 2
